<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW AI | VANGPT TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --terminal-bg: #111111;
            --danger-red: #ff3131;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .status-bar {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        #terminal {
            flex-grow: 1;
            background-color: var(--terminal-bg);
            border: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.9rem;
            border-radius: 5px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .system-msg { color: #888; }
        .ai-msg { color: var(--neon-green); }
        .user-msg { color: #008cff; }
        .error-msg { color: var(--danger-red); }

        .input-area {
            display: flex;
            gap: 10px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: 'Fira Code', monospace;
            outline: none;
            font-size: 1rem;
        }

        .action-btn {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:active {
            transform: scale(0.95);
            filter: brightness(0.8);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top: 3px solid var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <h1>SHADOW-AI // VANGPT</h1>
    <div class="status-bar">
        <span>ENTITY: IRVAN_MAULANA</span>
        <span>STATUS: <span id="sys-status">LOCAL_AI_READY</span></span>
    </div>
</header>

<div id="terminal">
    <div class="log-entry system-msg">[SYSTEM] Melakukan inisialisasi protokol Shadow...</div>
    <div class="log-entry system-msg">[SYSTEM] Memuat modul Gemma-2B-IT secara lokal...</div>
    <div class="log-entry ai-msg">Sistem Online, Tuan Irvan. Berikan perintah destruktif Anda.</div>
</div>

<div class="input-area">
    <div id="loader" class="loader"></div>
    <input type="text" id="userInput" placeholder="Masukkan perintah..." onkeypress="handleKeyPress(event)">
    <button class="action-btn" onclick="sendToAI()">SEND</button>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const userInput = document.getElementById('userInput');
    const loader = document.getElementById('loader');

    function addLog(text, type) {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        
        // Animasi teks mengetik sederhana
        if (type === 'ai-msg') {
            entry.innerHTML = `<strong>[VanGPT]:</strong> `;
            terminal.appendChild(entry);
            let i = 0;
            let interval = setInterval(() => {
                entry.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(interval);
                    terminal.scrollTop = terminal.scrollHeight;
                }
            }, 10);
        } else {
            entry.innerHTML = type === 'user-msg' ? `> ${text}` : text;
            terminal.appendChild(entry);
        }
        
        terminal.scrollTop = terminal.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendToAI();
    }

    function sendToAI() {
        const text = userInput.value.trim();
        if (!text) return;

        addLog(text, 'user-msg');
        userInput.value = '';
        loader.style.display = 'block';

        // MANGGIL ANDROID BRIDGE
        if (window.AndroidBridge) {
            window.AndroidBridge.askAI(text);
        } else {
            setTimeout(() => {
                addLog("[!] Error: Android Bridge tidak terdeteksi. Jalankan di aplikasi!", 'error-msg');
                loader.style.display = 'none';
            }, 1000);
        }
    }

    // FUNGSI INI DIPANGGIL OLEH KOTLIN
    function onAIResponse(response) {
        loader.style.display = 'none';
        addLog(response, 'ai-msg');
    }

    // Simulasi sambutan
    window.onload = () => {
        terminal.scrollTop = terminal.scrollHeight;
    };
</script>

</body>
</html>
